<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Re:trade | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-[50] flex items-center justify-center bg-[#05070a] p-6">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl border-indigo-500/20">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">RE:<span class="text-indigo-500">TRADE</span></h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Link Account</p>
            </div>

            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Roblox Username or Profile Link</label>
                    <input type="text" id="main-user-input" placeholder="Enter here..." 
                           class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 focus:border-indigo-500 text-white outline-none font-medium text-xs">
                </div>
                
                <button onclick="processLogin()" id="action-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4.5 rounded-2xl font-black uppercase tracking-widest transition shadow-xl active:scale-95 text-xs text-white">
                    Connect Account
                </button>

                <div id="loading-spinner" class="hidden text-center space-y-4">
                    <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                    <p class="text-[10px] font-mono text-indigo-400 font-bold uppercase italic">Validating Profile...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-site" class="hidden opacity-0 transition-opacity duration-500">
        <nav class="glass sticky top-0 z-10 px-6 py-4 flex justify-between items-center border-b border-white/5">
            <div class="text-xl font-black italic tracking-tighter">RE:<span class="text-indigo-500">TRADE</span></div>
            <div class="w-10 h-10 rounded-full border border-indigo-400/50 overflow-hidden bg-slate-900">
                <img id="nav-avatar" src="" class="w-full h-full object-cover">
            </div>
        </nav>

        <main class="p-6 text-center">
            <div class="py-12">
                <div class="w-24 h-24 mx-auto rounded-full border-4 border-indigo-500/20 p-1 mb-4">
                    <img id="profile-avatar" src="" class="w-full h-full object-cover rounded-full">
                </div>
                <h2 id="display-name" class="text-xl font-black text-white italic uppercase tracking-tighter">Verified User</h2>
                <p id="display-id" class="text-[9px] font-mono text-slate-500 mt-1 uppercase tracking-widest">Active</p>
            </div>
            <button onclick="logout()" class="w-full max-w-xs mx-auto bg-red-500/10 border border-red-500/20 text-red-500 py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Sign Out</button>
        </main>
    </div>

    <script>
        // Check for existing login on page load
        window.onload = () => {
            const savedData = localStorage.getItem('retrade_session');
            if (savedData) {
                const data = JSON.parse(savedData);
                showDashboard(data.val, data.isId);
            }
        };

        function processLogin() {
            const val = document.getElementById('main-user-input').value.trim();
            const btn = document.getElementById('action-btn');
            const loader = document.getElementById('loading-spinner');

            if (val.length < 2) {
                alert("Please enter a valid username or link.");
                return;
            }

            btn.classList.add('hidden');
            loader.classList.remove('hidden');

            // Detect if it's a URL/Link or just a Name
            const idFromLink = val.match(/\/users\/(\d+)\//);
            
            setTimeout(() => {
                let isId = false;
                let finalVal = val;

                if (idFromLink) {
                    finalVal = idFromLink[1];
                    isId = true;
                } else if (val.includes("/") || val.includes(".")) {
                    // It has link-style characters but isn't a valid Roblox link
                    alert("Please enter an existing Roblox profile!");
                    btn.classList.remove('hidden');
                    loader.classList.add('hidden');
                    return;
                }

                // Save and Show
                localStorage.setItem('retrade_session', JSON.stringify({val: finalVal, isId: isId}));
                showDashboard(finalVal, isId);
            }, 1000);
        }

        function showDashboard(identifier, isId) {
            document.getElementById('login-screen').classList.add('hidden');
            const site = document.getElementById('main-site');
            site.classList.remove('hidden');
            setTimeout(() => site.style.opacity = "1", 50);

            const avatarUrl = isId 
                ? `https://www.roblox.com/headshot-thumbnail/image?width=150&height=150&format=png&userId=${identifier}`
                : `https://www.roblox.com/headshot-thumbnail/image?width=150&height=150&format=png&username=${identifier}`;

            document.getElementById('nav-avatar').src = avatarUrl;
            document.getElementById('profile-avatar').src = avatarUrl;
            document.getElementById('display-name').innerText = isId ? "Verified User" : identifier;
            document.getElementById('display-id').innerText = isId ? `ID: ${identifier}` : `User: ${identifier}`;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
