<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Re:trade | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #f1f5f9; }
        /* This ensures the input is always clickable */
        .glass { 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); 
            pointer-events: auto;
        }
        .hidden { display: none; }
        .active-tab { border-bottom: 2px solid #6366f1; color: #6366f1; }
        /* Fix for mobile input appearance */
        input { 
            -webkit-user-select: text !important;
            user-select: text !important;
            cursor: text !important;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-[999] flex items-center justify-center bg-[#05070a] p-6">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl border-indigo-500/20 relative z-[1000]">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">RE:<span class="text-indigo-500">TRADE</span></h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Connect Account</p>
            </div>

            <div class="space-y-6">
                <div class="space-y-2 relative">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Username or Profile Link</label>
                    <input type="text" id="profile-input" placeholder="Type here..." 
                           class="relative z-[1001] w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 focus:border-indigo-500 text-white outline-none font-medium text-sm transition-all shadow-inner">
                </div>
                
                <button onclick="linkAccount()" id="link-btn" class="relative z-[1001] w-full bg-indigo-600 hover:bg-indigo-500 py-4.5 rounded-2xl font-black uppercase tracking-widest transition shadow-xl active:scale-95 text-xs">
                    Connect Account
                </button>

                <div id="search-loader" class="hidden text-center space-y-4">
                    <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                    <p class="text-[10px] font-mono text-indigo-400 font-bold uppercase italic">Accessing Data...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-site" class="hidden opacity-0 transition-opacity duration-500">
        <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5">
            <div class="text-xl font-black italic tracking-tighter">RE:<span class="text-indigo-500">TRADE</span></div>
            <div class="w-10 h-10 rounded-full border border-indigo-400/50 overflow-hidden bg-slate-900">
                <img id="nav-avatar" src="" class="w-full h-full object-cover">
            </div>
        </nav>

        <div class="flex justify-around bg-slate-900/50 border-b border-white/5 text-[10px] font-black uppercase tracking-widest">
            <button onclick="showTab('trade')" id="tab-btn-trade" class="py-4 px-2 active-tab">Trade</button>
            <button onclick="showTab('market')" id="tab-btn-market" class="py-4 px-2 text-slate-500">Market</button>
            <button onclick="showTab('profile')" id="tab-btn-profile" class="py-4 px-2 text-slate-500">Profile</button>
        </div>

        <main class="p-6">
            <section id="section-trade" class="space-y-6">
                <div class="glass rounded-3xl p-6 border border-white/5">
                    <h3 class="font-black text-lg mb-4 italic uppercase tracking-tighter text-white">New Trade Request</h3>
                    <div class="space-y-4">
                        <input type="text" placeholder="Opponent Username" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm font-bold outline-none text-white">
                        <textarea class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 h-24 text-sm outline-none text-white" placeholder="Items..."></textarea>
                        <button onclick="alert('Trade Sent!')" class="w-full bg-indigo-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest text-white">Submit Trade</button>
                    </div>
                </div>
            </section>

            <section id="section-market" class="hidden py-10 text-center">
                <div class="glass rounded-3xl p-8 border border-white/5 opacity-60">
                    <p class="text-[10px] font-black uppercase tracking-[0.3em] text-indigo-400">Scanning Listings</p>
                </div>
            </section>

            <section id="section-profile" class="hidden space-y-6 text-center">
                <div class="py-6">
                    <div class="w-24 h-24 mx-auto rounded-full border-4 border-indigo-500/20 p-1 mb-4">
                        <img id="profile-avatar" src="" class="w-full h-full object-cover rounded-full">
                    </div>
                    <h2 id="display-username" class="text-xl font-black text-white italic tracking-tighter uppercase">Verified</h2>
                    <p id="sub-info" class="text-[9px] font-mono text-slate-500 mt-1 uppercase">Active</p>
                </div>
                <button onclick="logout()" class="w-full bg-red-500/10 border border-red-500/20 text-red-500 py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Sign Out</button>
            </section>
        </main>
    </div>

    <script>
        window.onload = () => {
            const savedId = localStorage.getItem('retrade_id');
            const savedName = localStorage.getItem('retrade_user');
            if (savedId || savedName) renderDashboard(savedId || savedName, !!savedId);
        };

        function linkAccount() {
            const inputField = document.getElementById('profile-input');
            const input = inputField.value.trim();
            const btn = document.getElementById('link-btn');
            const loader = document.getElementById('search-loader');
            
            if (input.length < 2) {
                alert("Please enter a username or profile link.");
                return;
            }

            btn.classList.add('hidden');
            loader.classList.remove('hidden');

            const idMatch = input.match(/\/users\/(\d+)\//);
