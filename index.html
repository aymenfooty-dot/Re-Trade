<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Blade | Ultimate W/F/L Value Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: #0f0f18;
            --primary: #ff3131;
            --secondary: #00f2ff;
            --win: #00ff88;
            --loss: #ff3e3e;
            --fair: #ffd700;
            --mythic: #ff00ff;
            --legendary: #ff9d00;
            --border: #22222b;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 100px;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(180deg, #161625 0%, var(--bg) 100%);
            border-bottom: 2px solid var(--primary);
        }

        h1 { font-family: 'Orbitron'; letter-spacing: 3px; margin: 0; font-size: 2.5rem; }

        /* --- TRADE ANALYZER --- */
        .analyzer {
            max-width: 1100px;
            margin: -30px auto 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .side { width: 40%; text-align: center; }
        .side h3 { font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .side .val { font-family: 'Orbitron'; font-size: 2.2rem; color: var(--fair); }

        .status-badge {
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 900;
            font-family: 'Orbitron';
            font-size: 1.2rem;
            text-align: center;
            min-width: 140px;
        }

        .status-win { background: rgba(0, 255, 136, 0.1); color: var(--win); border: 2px solid var(--win); box-shadow: 0 0 15px rgba(0,255,136,0.3); }
        .status-loss { background: rgba(255, 62, 62, 0.1); color: var(--loss); border: 2px solid var(--loss); box-shadow: 0 0 15px rgba(255,62,62,0.3); }
        .status-fair { background: rgba(255, 215, 0, 0.1); color: var(--fair); border: 2px solid var(--fair); }

        /* --- SEARCH & TABS --- */
        .controls { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .search-input {
            width: 100%;
            padding: 18px 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: white;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 30px; }
        .tab {
            padding: 10px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: bold;
            color: #777;
        }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- ITEM GRID --- */
        .grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }

        .img-container {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .img-container img { width: 80%; height: auto; object-fit: contain; }

        .rarity { font-size: 0.6rem; font-weight: 800; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; margin-bottom: 8px; display: inline-block; }
        .mythic { background: var(--mythic); color: #000; }
        .legendary { background: var(--legendary); color: #000; }

        .name { font-weight: 700; font-size: 1.1rem; display: block; height: 40px; }
        .price { color: var(--fair); font-family: 'Orbitron'; font-size: 1.3rem; margin: 10px 0; }

        .btn-group { display: flex; gap: 5px; }
        .add-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #1a1a25; color: #fff; cursor: pointer; font-size: 0.75rem; }
        .add-btn:hover { background: var(--primary); }

        @media (max-width: 768px) {
            .analyzer { flex-direction: column; gap: 20px; margin: -20px 10px 20px; }
            .side { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>DEMON BLADE HUB</h1>
    <p>Real-Time Trading Values & Game Passes</p>
</header>

<div class="analyzer">
    <div class="side">
        <h3>YOU GIVE</h3>
        <div class="val" id="youVal">0</div>
        <button onclick="reset('you')" style="background:none; border:none; color:#444; cursor:pointer;">Clear</button>
    </div>
    
    <div id="status" class="status-badge status-fair">FAIR</div>

    <div class="side">
        <h3>THEY GIVE</h3>
        <div class="val" id="themVal">0</div>
        <button onclick="reset('them')" style="background:none; border:none; color:#444; cursor:pointer;">Clear</button>
    </div>
</div>

<div class="controls">
    <input type="text" class="search-input" id="search" placeholder="Search items, perms, or gamepasses..." onkeyup="filter()">
    <div class="tabs">
        <div class="tab active" onclick="setCat('all', this)">All Items</div>
        <div class="tab" onclick="setCat('perm', this)">Perms & Gamepasses</div>
        <div class="tab" onclick="setCat('weapon', this)">Weapons</div>
        <div class="tab" onclick="setCat('material', this)">World 2 Drops</div>
    </div>
</div>

<div class="grid" id="grid"></div>

<script>
    const db = [
        // GAMEPASSES & PERMS
        { name: "Sun Breathing (Perm)", val: 180000000, rar: "mythic", cat: "perm", img: "https://via.placeholder.com/150/ff00ff/000000?text=Sun+Perm" },
        { name: "Moon Breathing (Perm)", val: 165000000, rar: "mythic", cat: "perm", img: "https://via.placeholder.com/150/ff00ff/000000?text=Moon+Perm" },
        { name: "Fast Carriage Pass", val: 15000000, rar: "legendary", cat: "perm", img: "https://via.placeholder.com/150/ffa500/000000?text=Pass" },
        { name: "Fast XP Gamepass", val: 12000000, rar: "legendary", cat: "perm", img: "https://via.placeholder.com/150/ffa500/000000?text=XP+Pass" },

        // WEAPONS
        { name: "Sun Nichirin V5", val: 110000000, rar: "mythic", cat: "weapon", img: "https://via.placeholder.com/150/ff00ff/000000?text=Sun+V5" },
        { name: "Moon Slayer Katana", val: 95000000, rar: "mythic", cat: "weapon", img: "https://via.placeholder.com/150/ff00ff/000000?text=Moon+Blade" },
        { name: "Yamato", val: 75000000, rar: "mythic", cat: "weapon", img: "https://via.placeholder.com/150/ff00ff/000000?text=Yamato" },
        { name: "Zenith Scythe", val: 32000000, rar: "legendary", cat: "weapon", img: "https://via.placeholder.com/150/ffa500/000000?text=Scythe" },

        // WORLD 2
        { name: "Demon King's Blood", val: 25000000, rar: "mythic", cat: "material", img: "https://via.placeholder.com/150/ff00ff/000000?text=DK+Blood" },
        { name: "Sea Beast Tail", val: 4500000, rar: "legendary", cat: "material", img: "https://via.placeholder.com/150/ffa500/000000?text=Tail" },
        { name: "Evolution Fragment", val: 15000000, rar: "mythic", cat: "material", img: "https://via.placeholder.com/150/ff00ff/000000?text=Fragment" }
    ];

    let you = 0, them = 0, cat = 'all';

    function format(n) {
        return n >= 1000000 ? (n/1000000).toFixed(1) + 'M' : (n/1000).toFixed(0) + 'K';
    }

    function updateStatus() {
        const diff = them - you;
        const s = document.getElementById('status');
        if (you === 0 || them === 0) { s.innerText = "FAIR"; s.className = "status-badge status-fair"; return; }
        
        const perc = (diff / you) * 100;
        if (perc > 10) { s.innerText = "WIN"; s.className = "status-badge status-win"; }
        else if (perc < -10) { s.innerText = "LOSS"; s.className = "status-badge status-loss"; }
        else { s.innerText = "FAIR"; s.className = "status-badge status-fair"; }
    }

    function add(side, v) {
        if(side === 'you') you += v; else them += v;
        document.getElementById(side+'Val').innerText = format(side === 'you' ? you : them);
        updateStatus();
    }

    function reset(side) {
        if(side === 'you') you = 0; else them = 0;
        document.getElementById(side+'Val').innerText = '0';
        updateStatus();
    }

    function render(data) {
        document.getElementById('grid').innerHTML = data.map(i => `
            <div class="card">
                <div class="img-container"><img src="${i.img}"></div>
                <div class="rarity ${i.rar}">${i.rar}</div>
                <span class="name">${i.name}</span>
                <div class="price">${format(i.val)}</div>
                <div class="btn-group">
                    <button class="add-btn" onclick="add('you', ${i.val})">+ You</button>
                    <button class="add-btn" onclick="add('them', ${i.val})">+ Them</button>
                </div>
            </div>
        `).join('');
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        render(db.filter(i => i.name.toLowerCase().includes(q) && (cat === 'all' || i.cat === cat)));
    }

    function setCat(c, btn) {
        cat = c;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        filter();
    }

    render(db);
</script>
</body>
</html>
