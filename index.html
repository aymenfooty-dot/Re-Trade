     <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Re:Trade | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; --bg: #05070a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .hidden { display: none !important; }
        .game-card { border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .game-card.active { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
        .active-tab { color: var(--accent); border-bottom: 2px solid var(--accent); }
    </style>
</head>
<body class="min-h-screen">

    <section id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#05070a] p-6">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl border-indigo-500/20">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black italic tracking-tighter text-white uppercase">RE:<span class="text-indigo-500">TRADE</span></h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Connect Account</p>
            </div>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Username or Profile Link</label>
                    <input type="text" id="user-entry" placeholder="Paste link or name..." 
                           class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 focus:border-indigo-500 text-white outline-none font-medium text-sm transition-all">
                </div>
                <button onclick="handleLogin()" id="login-btn" class="w-full bg-indigo-600 py-4.5 rounded-2xl font-black uppercase tracking-widest text-xs text-white">Start Trading</button>
                <div id="loading-box" class="hidden text-center space-y-4">
                    <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                </div>
            </div>
        </div>
    </section>

    <div id="main-interface" class="hidden opacity-0 transition-opacity duration-700">
        <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black italic tracking-tighter">RE:<span class="text-indigo-500">TRADE</span></div>
            <div class="w-10 h-10 rounded-full border-2 border-indigo-500/30 overflow-hidden bg-slate-900">
                <img id="nav-pfp" src="" class="w-full h-full object-cover">
            </div>
        </nav>

        <div class="flex bg-slate-900/40 border-b border-white/5 font-black uppercase text-[10px] tracking-widest">
            <button onclick="changeView('trade')" id="tab-trade" class="flex-1 py-4 active-tab">Exchange</button>
            <button onclick="changeView('market')" id="tab-market" class="flex-1 py-4 text-slate-500">Live Feed</button>
            <button onclick="changeView('user')" id="tab-user" class="flex-1 py-4 text-slate-500">Profile</button>
        </div>

        <main class="max-w-xl mx-auto p-6 space-y-8">
            <section id="view-trade" class="space-y-6">
                <div class="grid grid-cols-2 gap-3">
                    <div onclick="setGame('Blox Fruits')" id="game-blox" class="game-card glass p-4 rounded-2xl text-center"><p class="text-[10px] font-black uppercase">Blox Fruits</p></div>
                    <div onclick="setGame('Demon Blade')" id="game-demon" class="game-card glass p-4 rounded-2xl text-center"><p class="text-[10px] font-black uppercase">Demon Blade</p></div>
                </div>
                <div class="glass rounded-[2rem] p-7 shadow-2xl">
                    <h3 id="current-game-title" class="text-lg font-black italic uppercase mb-5 tracking-tighter">New Trade</h3>
                    <div class="space-y-4">
                        <input type="text" placeholder="Target User" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-sm font-bold text-white">
                        <textarea placeholder="Items..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 h-28 text-sm outline-none text-white"></textarea>
                        <button onclick="alert('Trade Posted!')" class="w-full bg-indigo-600 py-4.5 rounded-xl font-black uppercase text-[10px] tracking-widest">Confirm</button>
                    </div>
                </div>
            </section>
            
            <section id="view-market" class="hidden space-y-3" id="live-feed"></section>
            
            <section id="view-user" class="hidden text-center py-8">
                <img id="main-avatar" src="" class="w-28 h-28 mx-auto rounded-full border-4 border-indigo-500/20 p-1 mb-5">
                <h2 id="profile-name" class="text-2xl font-black text-white italic uppercase">Trader</h2>
                <button onclick="logout()" class="w-full mt-12 bg-red-500/10 border border-red-500/20 text-red-500 py-4.5 rounded-2xl font-black uppercase text-[10px]">Sign Out</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
